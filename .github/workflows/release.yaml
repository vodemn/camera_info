name: Release

run-name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to pub.dev"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable

      - name: Calculate version
        uses: orhun/git-cliff-action@v4
        with:
          args: --bumped-version
        env:
          OUTPUT: VERSION.txt

      - name: Set version output
        id: version
        run: echo "version=$(tr -d '[:space:]v' < VERSION.txt)" >> $GITHUB_OUTPUT

      - name: Publish dry-run
        run: dart pub publish --dry-run

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --tag v${{ steps.version.outputs.version }}
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Prepend to CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            cat RELEASE_NOTES.md CHANGELOG.md > CHANGELOG_TMP.md && mv CHANGELOG_TMP.md CHANGELOG.md
          else
            cp RELEASE_NOTES.md CHANGELOG.md
          fi

      - name: Set version
        run: bash .github/scripts/set_version.sh ${{ steps.version.outputs.version }}

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml ios/camera_info.podspec README.md CHANGELOG.md
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git push origin ${{ github.ref_name }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md

      - name: Publish to pub.dev
        if: ${{ inputs.publish }}
        run: dart pub publish --force
